<template>
    <lightning-card title="AI System Diagnostics" icon-name="standard:dashboard">
        <div slot="actions">
            <lightning-button-group>
                <lightning-button 
                    label="Refresh" 
                    icon-name="utility:refresh"
                    onclick={handleRefresh}
                    disabled={isLoading}>
                </lightning-button>
                <lightning-button 
                    label="Run Health Check" 
                    icon-name="utility:shield"
                    variant="brand"
                    onclick={handleRunHealthCheck}
                    disabled={isLoading}>
                </lightning-button>
            </lightning-button-group>
        </div>
        
        <div class="slds-p-horizontal_medium">
            <!-- View Selector -->
            <lightning-radio-group
                name="viewSelector"
                label="Select View"
                options={viewOptions}
                value={selectedView}
                type="button"
                onchange={handleViewChange}>
            </lightning-radio-group>
            
            <!-- Loading Spinner -->
            <template if:true={isLoading}>
                <div class="slds-is-relative slds-m-top_large" style="height: 300px;">
                    <lightning-spinner 
                        alternative-text="Loading diagnostics..."
                        size="medium">
                    </lightning-spinner>
                </div>
            </template>
            
            <!-- Error Message -->
            <template if:true={error}>
                <div class="slds-m-top_medium">
                    <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                        <span class="slds-assistive-text">error</span>
                        <h2>Failed to load diagnostics. Please check your permissions and try again.</h2>
                    </div>
                </div>
            </template>
            
            <!-- Overview View -->
            <template if:false={isLoading}>
                <template if:true={isOverviewView}>
                    <div class="slds-m-top_large">
                        <!-- Overall Health Score -->
                        <div class="slds-grid slds-wrap slds-gutters">
                            <div class="slds-col slds-size_1-of-1">
                                <div class="slds-box slds-theme_shade">
                                    <div class="slds-text-align_center">
                                        <h2 class="slds-text-heading_medium slds-m-bottom_small">System Health Score</h2>
                                        <div class={overallHealthClass} style="font-size: 2rem; padding: 1rem;">
                                            <lightning-icon 
                                                icon-name={overallHealthIcon} 
                                                size="small"
                                                class="slds-m-right_x-small">
                                            </lightning-icon>
                                            {diagnosticsData.overallHealth}%
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Key Metrics Summary -->
                        <div class="slds-grid slds-wrap slds-gutters slds-m-top_medium">
                            <!-- Queue Status -->
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                                <article class="slds-card">
                                    <div class="slds-card__header">
                                        <h2 class="slds-card__header-title">Queue Status</h2>
                                    </div>
                                    <div class="slds-card__body slds-card__body_inner">
                                        <dl>
                                            <dt>Pending:</dt>
                                            <dd class="slds-text-heading_small">{diagnosticsData.queueMetrics.pendingCount}</dd>
                                            <dt>Processing:</dt>
                                            <dd class="slds-text-heading_small">{diagnosticsData.queueMetrics.processingCount}</dd>
                                            <dt>Failed (24h):</dt>
                                            <dd class="slds-text-heading_small slds-text-color_error">{diagnosticsData.queueMetrics.failedCount}</dd>
                                        </dl>
                                    </div>
                                </article>
                            </div>
                            
                            <!-- Provider Health -->
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                                <article class="slds-card">
                                    <div class="slds-card__header">
                                        <h2 class="slds-card__header-title">Provider Health</h2>
                                    </div>
                                    <div class="slds-card__body slds-card__body_inner">
                                        <template for:each={providerHealthData} for:item="provider">
                                            <div key={provider.id} class="slds-m-bottom_x-small">
                                                <lightning-icon 
                                                    icon-name={provider.statusIcon} 
                                                    size="x-small"
                                                    class={provider.statusClass}>
                                                </lightning-icon>
                                                <span class="slds-m-left_x-small">{provider.name}</span>
                                            </div>
                                        </template>
                                    </div>
                                </article>
                            </div>
                            
                            <!-- Performance -->
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                                <article class="slds-card">
                                    <div class="slds-card__header">
                                        <h2 class="slds-card__header-title">Performance</h2>
                                    </div>
                                    <div class="slds-card__body slds-card__body_inner">
                                        <dl>
                                            <dt>Success Rate:</dt>
                                            <dd class="slds-text-heading_small">{performanceChartData.successRate}%</dd>
                                            <dt>Throughput:</dt>
                                            <dd class="slds-text-heading_small">{performanceChartData.throughput}/hr</dd>
                                        </dl>
                                    </div>
                                </article>
                            </div>
                            
                            <!-- Configuration -->
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                                <article class="slds-card">
                                    <div class="slds-card__header">
                                        <h2 class="slds-card__header-title">Configuration</h2>
                                    </div>
                                    <div class="slds-card__body slds-card__body_inner">
                                        <template if:true={diagnosticsData.configurationStatus.isValid}>
                                            <div class="slds-text-color_success">
                                                <lightning-icon icon-name="utility:success" size="small"></lightning-icon>
                                                <span class="slds-m-left_x-small">Valid</span>
                                            </div>
                                        </template>
                                        <template if:false={diagnosticsData.configurationStatus.isValid}>
                                            <div class="slds-text-color_error">
                                                <lightning-icon icon-name="utility:error" size="small"></lightning-icon>
                                                <span class="slds-m-left_x-small">
                                                    {diagnosticsData.configurationStatus.errorCount} Errors
                                                </span>
                                            </div>
                                        </template>
                                    </div>
                                </article>
                            </div>
                        </div>
                    </div>
                </template>
                
                <!-- Queue Metrics View -->
                <template if:true={isQueueView}>
                    <div class="slds-m-top_large">
                        <div class="slds-grid slds-wrap slds-gutters">
                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <article class="slds-card">
                                    <div class="slds-card__header">
                                        <h2 class="slds-card__header-title">Queue Statistics</h2>
                                    </div>
                                    <div class="slds-card__body slds-card__body_inner">
                                        <dl class="slds-list_horizontal slds-wrap">
                                            <dt class="slds-item_label slds-text-color_weak">Total Pending:</dt>
                                            <dd class="slds-item_detail slds-text-heading_medium">{diagnosticsData.queueMetrics.pendingCount}</dd>
                                            
                                            <dt class="slds-item_label slds-text-color_weak">High Priority Pending:</dt>
                                            <dd class="slds-item_detail slds-text-heading_medium slds-text-color_error">{diagnosticsData.queueMetrics.highPriorityPending}</dd>
                                            
                                            <dt class="slds-item_label slds-text-color_weak">Currently Processing:</dt>
                                            <dd class="slds-item_detail slds-text-heading_medium">{diagnosticsData.queueMetrics.processingCount}</dd>
                                            
                                            <dt class="slds-item_label slds-text-color_weak">Failed (7 days):</dt>
                                            <dd class="slds-item_detail slds-text-heading_medium">{diagnosticsData.queueMetrics.failedCount}</dd>
                                            
                                            <dt class="slds-item_label slds-text-color_weak">Completed (7 days):</dt>
                                            <dd class="slds-item_detail slds-text-heading_medium">{diagnosticsData.queueMetrics.completedCount}</dd>
                                            
                                            <dt class="slds-item_label slds-text-color_weak">Avg Processing Time:</dt>
                                            <dd class="slds-item_detail slds-text-heading_medium">{diagnosticsData.queueMetrics.averageProcessingTime}ms</dd>
                                        </dl>
                                    </div>
                                </article>
                            </div>
                        </div>
                    </div>
                </template>
                
                <!-- Provider Health View -->
                <template if:true={isProvidersView}>
                    <div class="slds-m-top_large">
                        <template for:each={providerHealthData} for:item="provider">
                            <article key={provider.id} class="slds-card slds-m-bottom_medium">
                                <div class="slds-card__header">
                                    <h2 class="slds-card__header-title">
                                        <lightning-icon 
                                            icon-name={provider.statusIcon} 
                                            size="small"
                                            class={provider.statusClass}>
                                        </lightning-icon>
                                        <span class="slds-m-left_small">{provider.name}</span>
                                    </h2>
                                </div>
                                <div class="slds-card__body slds-card__body_inner">
                                    <div class="slds-grid slds-wrap">
                                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                                            <dl>
                                                <dt class="slds-text-color_weak">Status:</dt>
                                                <dd class={provider.statusClass}>{provider.status}</dd>
                                                <dt class="slds-text-color_weak">Response Time:</dt>
                                                <dd>{provider.responseTime}ms</dd>
                                            </dl>
                                        </div>
                                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                                            <dl>
                                                <dt class="slds-text-color_weak">24h Uptime:</dt>
                                                <dd>{provider.uptime}%</dd>
                                                <dt class="slds-text-color_weak">Last Check:</dt>
                                                <dd>{provider.lastCheck}</dd>
                                            </dl>
                                        </div>
                                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                                            <dt class="slds-text-color_weak">Message:</dt>
                                            <dd>{provider.message}</dd>
                                        </div>
                                    </div>
                                </div>
                            </article>
                        </template>
                    </div>
                </template>
                
                <!-- Performance View -->
                <template if:true={isPerformanceView}>
                    <div class="slds-m-top_large">
                        <div class="slds-grid slds-wrap slds-gutters">
                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <article class="slds-card">
                                    <div class="slds-card__header">
                                        <h2 class="slds-card__header-title">Success Metrics</h2>
                                    </div>
                                    <div class="slds-card__body slds-card__body_inner">
                                        <div class="slds-text-align_center">
                                            <div class="slds-text-heading_large">{performanceChartData.successRate}%</div>
                                            <div class="slds-text-body_regular slds-text-color_weak">Success Rate (24h)</div>
                                        </div>
                                    </div>
                                </article>
                            </div>
                            
                            <div class="slds-col slds-size_1-of-1 slds-large-size_1-of-2">
                                <article class="slds-card">
                                    <div class="slds-card__header">
                                        <h2 class="slds-card__header-title">Throughput</h2>
                                    </div>
                                    <div class="slds-card__body slds-card__body_inner">
                                        <div class="slds-text-align_center">
                                            <div class="slds-text-heading_large">{performanceChartData.throughput}</div>
                                            <div class="slds-text-body_regular slds-text-color_weak">Records per Hour</div>
                                        </div>
                                    </div>
                                </article>
                            </div>
                        </div>
                    </div>
                </template>
                
                <!-- System Limits View -->
                <template if:true={isLimitsView}>
                    <div class="slds-m-top_large">
                        <article class="slds-card">
                            <div class="slds-card__header">
                                <h2 class="slds-card__header-title">Org Limits Usage</h2>
                            </div>
                            <div class="slds-card__body slds-card__body_inner">
                                <div class="slds-m-bottom_medium">
                                    <div class="slds-text-body_regular">
                                        <strong>API Calls</strong>
                                        <span class={apiUsageClass}> ({diagnosticsData.systemLimits.apiCallsPercentage}%)</span>
                                    </div>
                                    <div class="slds-progress-bar slds-progress-bar_circular">
                                        <span class="slds-progress-bar__value" style={`width: ${diagnosticsData.systemLimits.apiCallsPercentage}%`}>
                                            <span class="slds-assistive-text">Progress: {diagnosticsData.systemLimits.apiCallsPercentage}%</span>
                                        </span>
                                    </div>
                                    <div class="slds-text-body_small slds-text-color_weak">
                                        {diagnosticsData.systemLimits.apiCallsUsed} / {diagnosticsData.systemLimits.apiCallsLimit}
                                    </div>
                                </div>
                                
                                <div class="slds-m-bottom_medium">
                                    <div class="slds-text-body_regular">
                                        <strong>Data Storage</strong>
                                        <span class={storageUsageClass}> ({diagnosticsData.systemLimits.storagePercentage}%)</span>
                                    </div>
                                    <div class="slds-progress-bar slds-progress-bar_circular">
                                        <span class="slds-progress-bar__value" style={`width: ${diagnosticsData.systemLimits.storagePercentage}%`}>
                                            <span class="slds-assistive-text">Progress: {diagnosticsData.systemLimits.storagePercentage}%</span>
                                        </span>
                                    </div>
                                    <div class="slds-text-body_small slds-text-color_weak">
                                        {diagnosticsData.systemLimits.storageUsedMB} MB / {diagnosticsData.systemLimits.storageLimitMB} MB
                                    </div>
                                </div>
                                
                                <div class="slds-m-bottom_medium">
                                    <div class="slds-text-body_regular">
                                        <strong>Platform Events</strong>
                                        <span class={platformEventsUsageClass}> ({diagnosticsData.systemLimits.platformEventsPercentage}%)</span>
                                    </div>
                                    <div class="slds-progress-bar slds-progress-bar_circular">
                                        <span class="slds-progress-bar__value" style={`width: ${diagnosticsData.systemLimits.platformEventsPercentage}%`}>
                                            <span class="slds-assistive-text">Progress: {diagnosticsData.systemLimits.platformEventsPercentage}%</span>
                                        </span>
                                    </div>
                                    <div class="slds-text-body_small slds-text-color_weak">
                                        {diagnosticsData.systemLimits.platformEventsUsed} / {diagnosticsData.systemLimits.platformEventsLimit}
                                    </div>
                                </div>
                            </div>
                        </article>
                    </div>
                </template>
                
                <!-- Recent Errors View -->
                <template if:true={isErrorsView}>
                    <div class="slds-m-top_large">
                        <template if:true={hasErrors}>
                            <template for:each={diagnosticsData.recentErrors} for:item="error">
                                <article key={error.timestamp} class="slds-card slds-m-bottom_small">
                                    <div class="slds-card__body slds-card__body_inner">
                                        <div class="slds-grid slds-wrap">
                                            <div class="slds-col slds-size_1-of-1">
                                                <div class="slds-text-color_error slds-text-heading_small">
                                                    <lightning-icon icon-name="utility:error" size="x-small"></lightning-icon>
                                                    <span class="slds-m-left_x-small">{error.errorType}</span>
                                                </div>
                                            </div>
                                            <div class="slds-col slds-size_1-of-1 slds-m-top_x-small">
                                                <div class="slds-text-body_regular">{error.message}</div>
                                            </div>
                                            <div class="slds-col slds-size_1-of-1 slds-m-top_x-small">
                                                <div class="slds-text-body_small slds-text-color_weak">
                                                    {error.context} • {error.timestamp}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </article>
                            </template>
                        </template>
                        <template if:false={hasErrors}>
                            <div class="slds-illustration slds-illustration_small">
                                <div class="slds-text-align_center">
                                    <lightning-icon icon-name="utility:success" size="large" variant="success"></lightning-icon>
                                    <h3 class="slds-text-heading_medium slds-m-top_medium">No Recent Errors</h3>
                                    <p class="slds-text-body_regular">The system is operating without errors.</p>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>

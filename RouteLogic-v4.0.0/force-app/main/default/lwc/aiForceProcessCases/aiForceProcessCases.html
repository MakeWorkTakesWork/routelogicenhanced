<template>
    <lightning-card title="Force Process Cases" icon-name="utility:forward">
        <div class="slds-p-horizontal_medium">
            <!-- Provider Selection -->
            <div class="slds-m-bottom_medium">
                <lightning-combobox
                    label="AI Provider"
                    value={selectedProvider}
                    options={providers}
                    onchange={handleProviderChange}
                    placeholder="Select an AI provider"
                    disabled={isProcessing}
                    required>
                </lightning-combobox>
                
                <template if:false={hasProviders}>
                    <div class="slds-m-top_small">
                        <lightning-formatted-text 
                            value="No AI providers are configured. Please configure providers before proceeding."
                            class="slds-text-color_error">
                        </lightning-formatted-text>
                    </div>
                </template>
            </div>
            
            <!-- Case IDs Input -->
            <div class="slds-m-bottom_medium">
                <lightning-textarea
                    label="Case IDs"
                    value={caseIds}
                    onchange={handleCaseIdsChange}
                    placeholder="Enter Case IDs separated by commas, spaces, or new lines"
                    disabled={isProcessing}
                    required
                    rows="6"
                    field-level-help={helpText}>
                </lightning-textarea>
                
                <!-- Helper Information -->
                <div class="slds-m-top_x-small">
                    <div class="slds-text-body_small slds-text-color_weak">
                        {exampleText}
                    </div>
                    <div class="slds-text-body_small slds-m-top_x-small" 
                         class={caseCountClass}>
                        {caseCountMessage}
                    </div>
                </div>
            </div>
            
            <!-- Action Buttons -->
            <div class="slds-grid slds-gutters">
                <div class="slds-col">
                    <lightning-button
                        label="Force Process Cases"
                        variant="brand"
                        icon-name="utility:forward"
                        onclick={handleForceProcess}
                        disabled={isFormDisabled}
                        class="slds-m-right_small">
                    </lightning-button>
                    
                    <lightning-button
                        label="Clear"
                        variant="neutral"
                        onclick={handleClear}
                        disabled={isProcessing}>
                    </lightning-button>
                </div>
            </div>
            
            <!-- Processing Indicator -->
            <template if:true={isProcessing}>
                <div class="slds-m-top_medium">
                    <div class="slds-grid slds-grid_align-center">
                        <lightning-spinner size="small" alternative-text="Processing..."></lightning-spinner>
                        <span class="slds-m-left_small slds-text-body_small">
                            Initiating processing for selected cases...
                        </span>
                    </div>
                </div>
            </template>
            
            <!-- Information Box -->
            <div class="slds-box slds-theme_shade slds-m-top_medium">
                <h4 class="slds-text-heading_small slds-m-bottom_small">
                    <lightning-icon icon-name="utility:info" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                    Force Processing Information
                </h4>
                
                <ul class="slds-list_dotted slds-text-body_small">
                    <li>Force processing bypasses normal queuing and processes cases immediately</li>
                    <li>Cases will be processed with the selected AI provider regardless of their current status</li>
                    <li>Processing results will be available in the case records and processing metrics</li>
                    <li>Maximum 100 cases can be processed in a single batch</li>
                    <li>Processing typically takes 1-5 minutes depending on provider response times</li>
                </ul>
            </div>
        </div>
    </lightning-card>
</template>

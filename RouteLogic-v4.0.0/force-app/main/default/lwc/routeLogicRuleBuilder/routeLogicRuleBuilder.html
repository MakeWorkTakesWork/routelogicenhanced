<template>
    <lightning-card title="RouteLogic Rule Builder" icon-name="custom:custom109">
        <div slot="actions">
            <lightning-button-group>
                <lightning-button 
                    label="New Rule" 
                    icon-name="utility:add" 
                    variant="brand"
                    onclick={handleNewRule}>
                </lightning-button>
                <lightning-button 
                    label="Export Rules" 
                    icon-name="utility:download" 
                    onclick={handleExportRules}>
                </lightning-button>
                <lightning-file-upload
                    label="Import Rules"
                    name="fileUploader"
                    accept=".json"
                    record-id=""
                    onuploadfinished={handleImportRules}
                    multiple="false">
                </lightning-file-upload>
            </lightning-button-group>
        </div>
        
        <!-- Loading Spinner -->
        <template if:true={isLoading}>
            <div class="slds-is-relative slds-p-around_large">
                <lightning-spinner alternative-text="Loading rule builder..."></lightning-spinner>
            </div>
        </template>
        
        <!-- Error State -->
        <template if:true={error}>
            <div class="slds-p-around_medium">
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error" role="alert">
                    <span class="slds-assistive-text">Error</span>
                    <h2>
                        <lightning-formatted-text value="Error loading rule builder"></lightning-formatted-text>
                        <template if:true={errorMessage}>
                            <lightning-formatted-text value={errorMessage}></lightning-formatted-text>
                        </template>
                    </h2>
                </div>
            </div>
        </template>
        
        <!-- Main Content -->
        <template if:false={isLoading}>
            <template if:false={error}>
                <div class="slds-p-around_medium">
                    
                    <!-- Rules List -->
                    <template if:true={hasRules}>
                        <lightning-datatable
                            key-field="id"
                            data={rules}
                            columns={ruleColumns}
                            onrowaction={handleRowAction}
                            hide-checkbox-column="true">
                        </lightning-datatable>
                    </template>
                    
                    <!-- No Rules State -->
                    <template if:false={hasRules}>
                        <div class="slds-text-align_center slds-p-around_large">
                            <lightning-icon icon-name="utility:rules" size="large"></lightning-icon>
                            <h3 class="slds-m-top_small">No Rules Configured</h3>
                            <p class="slds-m-bottom_medium">Create your first routing rule to get started.</p>
                            <lightning-button 
                                label="Create First Rule" 
                                variant="brand"
                                icon-name="utility:add"
                                onclick={handleNewRule}>
                            </lightning-button>
                        </div>
                    </template>
                    
                </div>
            </template>
        </template>
        
        <!-- Rule Configuration Modal -->
        <template if:true={showRuleModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" 
                                title="Close" onclick={handleCancelRule}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-text-heading_medium slds-hyphenate">
                            <template if:true={editingRule}>Edit Rule</template>
                            <template if:false={editingRule}>New Rule</template>
                        </h2>
                    </header>
                    
                    <div class="slds-modal__content slds-p-around_medium">
                        
                        <!-- Basic Rule Information -->
                        <div class="slds-grid slds-gutters slds-m-bottom_large">
                            <div class="slds-col slds-size_1-of-2">
                                <lightning-input
                                    label="Rule Name"
                                    value={currentRule.name}
                                    onchange={handleRuleNameChange}
                                    required>
                                </lightning-input>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <lightning-combobox
                                    label="Object Type"
                                    value={currentRule.objectType}
                                    placeholder="Select object type"
                                    options={objectTypeOptions}
                                    onchange={handleObjectTypeChange}
                                    required>
                                </lightning-combobox>
                            </div>
                        </div>
                        
                        <div class="slds-grid slds-gutters slds-m-bottom_large">
                            <div class="slds-col slds-size_2-of-3">
                                <lightning-textarea
                                    label="Description"
                                    value={currentRule.description}
                                    onchange={handleRuleDescriptionChange}
                                    placeholder="Describe what this rule does...">
                                </lightning-textarea>
                            </div>
                            <div class="slds-col slds-size_1-of-3">
                                <lightning-combobox
                                    label="Priority"
                                    value={currentRule.priority}
                                    options={priorityOptions}
                                    onchange={handleRulePriorityChange}>
                                </lightning-combobox>
                                <div class="slds-m-top_small">
                                    <lightning-input
                                        type="toggle"
                                        label="Active"
                                        checked={currentRule.isActive}
                                        onchange={handleRuleActiveChange}
                                        message-when-active="Rule is active"
                                        message-when-inactive="Rule is inactive">
                                    </lightning-input>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Conditions Section -->
                        <div class="slds-m-bottom_large">
                            <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                                <h3 class="slds-text-heading_small">Conditions</h3>
                                <lightning-button
                                    label="Add Condition"
                                    icon-name="utility:add"
                                    onclick={handleAddCondition}>
                                </lightning-button>
                            </div>
                            
                            <template if:true={currentRule.conditions}>
                                <template for:each={currentRule.conditions} for:item="condition" for:index="index">
                                    <div key={condition.id} class="condition-row slds-box slds-m-bottom_small">
                                        
                                        <!-- Logical Operator (for conditions after the first) -->
                                        <template if:true={condition.logicalOperator}>
                                            <div class="slds-m-bottom_small">
                                                <lightning-radio-group
                                                    name={condition.id}
                                                    label="Logical Operator"
                                                    options={logicalOperatorOptions}
                                                    value={condition.logicalOperator}
                                                    onchange={handleConditionLogicalOperatorChange}
                                                    data-id={condition.id}
                                                    type="button">
                                                </lightning-radio-group>
                                            </div>
                                        </template>
                                        
                                        <div class="slds-grid slds-gutters slds-grid_align-end">
                                            <div class="slds-col slds-size_1-of-4">
                                                <lightning-combobox
                                                    label="Field"
                                                    value={condition.field}
                                                    placeholder="Select field"
                                                    options={objectFields}
                                                    onchange={handleConditionFieldChange}
                                                    data-id={condition.id}>
                                                </lightning-combobox>
                                            </div>
                                            <div class="slds-col slds-size_1-of-4">
                                                <lightning-combobox
                                                    label="Operator"
                                                    value={condition.operator}
                                                    options={operatorOptions}
                                                    onchange={handleConditionOperatorChange}
                                                    data-id={condition.id}>
                                                </lightning-combobox>
                                            </div>
                                            <div class="slds-col slds-size_1-of-3">
                                                <lightning-input
                                                    label="Value"
                                                    value={condition.value}
                                                    onchange={handleConditionValueChange}
                                                    data-id={condition.id}
                                                    placeholder="Enter value...">
                                                </lightning-input>
                                            </div>
                                            <div class="slds-col slds-size_1-of-12">
                                                <lightning-button-icon
                                                    icon-name="utility:delete"
                                                    variant="border-filled"
                                                    alternative-text="Remove condition"
                                                    title="Remove condition"
                                                    onclick={handleRemoveCondition}
                                                    data-id={condition.id}>
                                                </lightning-button-icon>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </template>
                            
                            <template if:false={currentRule.conditions.length}>
                                <div class="slds-text-align_center slds-p-around_medium slds-border_top slds-border_bottom">
                                    <p class="slds-text-color_weak">No conditions defined. Add at least one condition.</p>
                                </div>
                            </template>
                        </div>
                        
                        <!-- Actions Section -->
                        <div class="slds-m-bottom_large">
                            <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                                <h3 class="slds-text-heading_small">Actions</h3>
                                <lightning-button
                                    label="Add Action"
                                    icon-name="utility:add"
                                    onclick={handleAddAction}>
                                </lightning-button>
                            </div>
                            
                            <template if:true={currentRule.actions}>
                                <template for:each={currentRule.actions} for:item="action" for:index="index">
                                    <div key={action.id} class="action-row slds-box slds-m-bottom_small">
                                        <div class="slds-grid slds-gutters slds-grid_align-end">
                                            <div class="slds-col slds-size_1-of-3">
                                                <lightning-combobox
                                                    label="Action Type"
                                                    value={action.type}
                                                    options={actionTypeOptions}
                                                    onchange={handleActionTypeChange}
                                                    data-id={action.id}>
                                                </lightning-combobox>
                                            </div>
                                            <div class="slds-col slds-size_1-of-2">
                                                <template if:true={action.type}>
                                                    <template if:false={action.isStopProcessing}>
                                                        <lightning-input
                                                            label="Value"
                                                            value={action.value}
                                                            onchange={handleActionValueChange}
                                                            data-id={action.id}
                                                            placeholder="Enter action value...">
                                                        </lightning-input>
                                                    </template>
                                                </template>
                                            </div>
                                            <div class="slds-col slds-size_1-of-12">
                                                <lightning-button-icon
                                                    icon-name="utility:delete"
                                                    variant="border-filled"
                                                    alternative-text="Remove action"
                                                    title="Remove action"
                                                    onclick={handleRemoveAction}
                                                    data-id={action.id}>
                                                </lightning-button-icon>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </template>
                            
                            <template if:false={currentRule.actions.length}>
                                <div class="slds-text-align_center slds-p-around_medium slds-border_top slds-border_bottom">
                                    <p class="slds-text-color_weak">No actions defined. Add at least one action.</p>
                                </div>
                            </template>
                        </div>
                        
                    </div>
                    
                    <footer class="slds-modal__footer">
                        <lightning-button 
                            label="Cancel" 
                            onclick={handleCancelRule}>
                        </lightning-button>
                        <lightning-button 
                            label="Save Rule" 
                            variant="brand"
                            onclick={handleSaveRule}>
                        </lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
        
    </lightning-card>
</template>

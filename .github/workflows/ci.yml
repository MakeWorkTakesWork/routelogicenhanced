name: CI
on:
  push:
    branches: [ main, chore/** ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Salesforce CLI and plugins
        run: |
          npm install --global @salesforce/cli @salesforce/sfdx-scanner @salesforce/plugin-deploy-retrieve
          sf --version
          sfdx-scanner --version || true
      - name: Static analysis (PMD via sfdx-scanner)
        run: |
          sfdx-scanner run --format junit --severity-threshold 3 --target "RouteLogic-v4.0.0/force-app/main/default/classes/**/*.cls,RouteLogic-v4.0.0/force-app/main/default/lwc/**/*.js" || true
      - name: LWC ESLint (if config present)
        run: |
          if [ -f ".eslintrc.json" ] || [ -f ".eslint.cjs" ]; then
            npm ci || npm i --no-audit --no-fund
            npx eslint RouteLogic-v4.0.0/force-app/main/default/lwc --ext .js --max-warnings 0
          else
            echo "No ESLint config; skipping"
          fi
      - name: Repo snapshot
        run: |
          echo "Listing repository root:" && ls -la

  apex-tests:
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli @salesforce/plugin-deploy-retrieve
          sf --version
      - name: Authenticate to Org
        if: ${{ secrets.SFDX_AUTH_URL != '' || (secrets.SFDX_USERNAME != '' && secrets.SFDX_PASSWORD != '' && secrets.SFDX_SECURITY_TOKEN != '' && secrets.SFDX_LOGIN_URL != '') }}
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
          SFDX_USERNAME: ${{ secrets.SFDX_USERNAME }}
          SFDX_PASSWORD: ${{ secrets.SFDX_PASSWORD }}
          SFDX_SECURITY_TOKEN: ${{ secrets.SFDX_SECURITY_TOKEN }}
          SFDX_LOGIN_URL: ${{ secrets.SFDX_LOGIN_URL }}
        run: |
          set -e
          if [ -n "$SFDX_AUTH_URL" ]; then
            echo "$SFDX_AUTH_URL" > auth.sfdxurl
            sf org login sfdx-url --sfdx-url-file auth.sfdxurl --alias ciOrg --set-default
          else
            sf org login web --alias ciOrg --instance-url "$SFDX_LOGIN_URL" --set-default --no-prompt || true
            sfdx force:auth:password:login -r "$SFDX_LOGIN_URL" -u "$SFDX_USERNAME" -p "$SFDX_PASSWORD$SFDX_SECURITY_TOKEN" -a ciOrg || true
          fi
          sf org display --target-org ciOrg
      - name: Deploy metadata and run tests
        if: ${{ secrets.SFDX_AUTH_URL != '' || (secrets.SFDX_USERNAME != '' && secrets.SFDX_PASSWORD != '' && secrets.SFDX_SECURITY_TOKEN != '' && secrets.SFDX_LOGIN_URL != '') }}
        run: |
          set -e
          sf project deploy start --source-dir RouteLogic-v4.0.0/force-app/main/default --target-org ciOrg --tests "*" --test-level RunLocalTests --wait 60
      - name: Skip tests (no org secrets configured)
        if: ${{ !(secrets.SFDX_AUTH_URL != '' || (secrets.SFDX_USERNAME != '' && secrets.SFDX_PASSWORD != '' && secrets.SFDX_SECURITY_TOKEN != '' && secrets.SFDX_LOGIN_URL != '')) }}
        run: |
          echo "Skipping Apex tests; no org auth secrets configured for this repository."
